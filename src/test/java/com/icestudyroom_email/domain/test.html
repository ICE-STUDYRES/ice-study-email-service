<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Weekly Ranking Socket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4/dist/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h2 {
            margin-bottom: 10px;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin: 6px 0;
        }
        .connected {
            color: green;
            font-weight: bold;
        }
        .personal {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            background: #fafafa;
        }
    </style>
</head>
<body>

<h2>📡 Weekly Ranking Socket Test</h2>
<div id="status">⏳ connecting...</div>

<ul id="ranking"></ul>

<div class="personal">
    <h3>🔔 개인 알림</h3>
    <ul id="personal"></ul>
</div>

<script>
    console.log("HTML loaded");

    const memberId = 6;

    const statusEl = document.getElementById("status");
    const rankingEl = document.getElementById("ranking");
    const personalEl = document.getElementById("personal");

    const socket = io("http://localhost:3001/ranking", {
        transports: ["websocket"]
    });

    socket.on("connect", () => {
        console.log("connected:", socket.id);
        statusEl.textContent = "✅ connected";
        statusEl.className = "connected";

        socket.emit("join", "weekly");
        socket.emit("join", `member:${memberId}`);
    });

    // ✅ 서버 이벤트 이름에 맞춤
    socket.on("ranking-update", (data) => {
        console.log("📡 ranking update:", data);

        rankingEl.innerHTML = "";

        if (!data || data.length === 0) {
            rankingEl.innerHTML = "<li>랭킹 데이터가 없습니다</li>";
            return;
        }

        data.forEach(item => {
            const li = document.createElement("li");

            // ✅ score 제거
            li.textContent = `🏅 ${item.rank}위 | ${item.name}`;

            rankingEl.appendChild(li);
        });
    });

    socket.on("personal-notification", (data) => {
        console.log("🔔 personal notification:", data);

        const li = document.createElement("li");
        li.textContent = `📌 ${data.type}`;
        personalEl.prepend(li);
    });

    socket.on("disconnect", () => {
        statusEl.textContent = "❌ disconnected";
        statusEl.className = "";
    });
</script>

</body>
</html>
