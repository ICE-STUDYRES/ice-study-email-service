name: Deploy Kafka Email Service

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle build outputs
        uses: actions/cache@v3
        with:
          path: build
          key: ${{ runner.os }}-gradle-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew clean --no-daemon
          ./gradlew bootJar -x test --no-daemon

      - name: Get GitHub Actions Runner IP
        run: |
          RUNNER_IP=$(curl -s ifconfig.me)
          if [[ -z "$RUNNER_IP" ]]; then
            echo "Error: Unable to retrieve GitHub Actions Runner IP."
            exit 1
          fi
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "GitHub Actions Runner IP: $RUNNER_IP"

      - name: Add SSH IP to EC2 Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp --port 22 --cidr $RUNNER_IP/32 \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Create .env file
        run: |
          cat > .env << EOF
          EC2_HOST=${{ secrets.EC2_HOST }}

          # 메일 설정
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_HOST=smtp.gmail.com
          MAIL_PORT=587
          
          # Spring Boot 설정
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=8080
          LOGGING_LEVEL_ROOT=INFO
          
          # Kafka 설정
          KAFKA_BOOTSTRAP_SERVERS=kafka:9093
          
          # 타임존
          TZ=Asia/Seoul
          EOF

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            sudo mkdir -p /home/ubuntu/ice-study-email-service/
            sudo chown ubuntu:ubuntu /home/ubuntu/ice-study-email-service/
            chmod 755 /home/ubuntu/ice-study-email-service/

      - name: Verify files before copy
        run: |
          echo "=== 파일 존재 확인 ==="
          ls -la .env
          ls -la docker-compose.yml
          ls -la Dockerfile
          ls -la build/libs/*.jar

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          source: ".env,docker-compose.yml,Dockerfile,build/libs/*.jar"
          target: "/home/ubuntu/ice-study-email-service/"
          timeout: 60s
          command_timeout: 15m
          strip_components: 0
          rm: false

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            cd /home/ubuntu/ice-study-email-service
            
            echo "🔍 현재 Docker 상태 확인..."
            docker ps -a
            docker images
            
            # 1️⃣ 모든 실행 중인 컨테이너 강제 정지
            echo "🛑 모든 컨테이너 강제 정지..."
            docker stop $(docker ps -aq) 2>/dev/null || true
            
            # 2️⃣ 특정 컨테이너들 강제 제거
            echo "🗑️ 기존 컨테이너들 강제 제거..."
            docker rm -f zookeeper kafka email-app 2>/dev/null || true
            
            # 3️⃣ 사용하지 않는 이미지 제거
            echo "🧹 사용하지 않는 이미지 제거..."
            docker image prune -af
            
            # 4️⃣ 네트워크 정리
            echo "🌐 Docker 네트워크 정리..."
            docker network prune -f
            
            # 5️⃣ 볼륨 정리 (주의: 데이터 손실 가능)
            echo "💾 사용하지 않는 볼륨 정리..."
            docker volume prune -f
            
            # 6️⃣ 포트 사용 중인 프로세스 확인 및 종료
            echo "🔌 포트 사용 확인..."
            sudo lsof -ti:8080 | xargs sudo kill -9 2>/dev/null || true
            sudo lsof -ti:9092 | xargs sudo kill -9 2>/dev/null || true
            sudo lsof -ti:2181 | xargs sudo kill -9 2>/dev/null || true
            
            # 7️⃣ Docker 컴포즈 프로젝트별 정리
            echo "📦 Docker Compose 프로젝트 정리..."
            docker-compose down --volumes --remove-orphans 2>/dev/null || true
            
            # 8️⃣ 시스템 전체 Docker 정리
            echo "🧽 시스템 전체 Docker 정리..."
            docker system prune -af --volumes
            
            # 9️⃣ 잠시 대기 (시스템 안정화)
            echo "⏱️ 시스템 안정화 대기..."
            sleep 10
            
            # 🔟 새로운 서비스 시작
            echo "🚀 새로운 서비스 시작..."
            docker-compose up -d --build --force-recreate
            
            # 서비스 상태 확인
            echo "⏳ 서비스 시작 대기..."
            sleep 30
            
            echo "=== 📊 Service Status ==="
            docker-compose ps
            
            echo "=== 🔍 Container Logs ==="
            docker-compose logs --tail=20
            
            # Kafka 준비 상태 확인
            echo "=== 📋 Kafka Health Check ==="
            for i in {1..10}; do
              if docker exec kafka kafka-topics --list --bootstrap-server localhost:9092 > /dev/null 2>&1; then
                echo "✅ Kafka is ready!"
                docker exec kafka kafka-topics --list --bootstrap-server localhost:9092
                break
              else
                echo "⏳ Kafka 준비 중... ($i/10)"
                sleep 10
              fi
            done
            
            # 애플리케이션 헬스체크
            echo "=== 🏥 Application Health Check ==="
            for i in {1..10}; do
              if curl -f http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ Application is healthy!"
                break
              else
                echo "⏳ Application 시작 중... ($i/10)"
                sleep 10
              fi
            done
            
            echo "=== 🎯 Final Status ==="
            docker ps
            docker-compose ps

      - name: Clean Up Docker Images
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            echo "🧹 Cleaning up unused Docker images..."
            docker image prune -af --filter "until=24h"

      - name: Remove SSH IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp --port 22 --cidr $RUNNER_IP/32 \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true
