name: Deploy Kafka Email Service

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle build outputs
        uses: actions/cache@v3
        with:
          path: build
          key: ${{ runner.os }}-gradle-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew clean --no-daemon
          ./gradlew bootJar -x test --no-daemon

      - name: Get GitHub Actions Runner IP
        run: |
          RUNNER_IP=$(curl -s ifconfig.me)
          if [[ -z "$RUNNER_IP" ]]; then
            echo "Error: Unable to retrieve GitHub Actions Runner IP."
            exit 1
          fi
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "GitHub Actions Runner IP: $RUNNER_IP"

      - name: Add SSH IP to EC2 Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp --port 22 --cidr $RUNNER_IP/32 \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Create .env file
        run: |
          cat > .env << EOF
          EC2_HOST=${{ secrets.EC2_HOST }}

          # 메일 설정
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_HOST=smtp.gmail.com
          MAIL_PORT=587
          
          # Spring Boot 설정
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=8080
          LOGGING_LEVEL_ROOT=INFO
          
          # Kafka 설정
          KAFKA_BOOTSTRAP_SERVERS=kafka:9093
          
          # 타임존
          TZ=Asia/Seoul
          EOF

      - name: Emergency Disk Cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            echo "🚨 현재 디스크 사용량"
            df -h
            
            echo "🧹 Docker 완전 정리 (모든 데이터 삭제)"
            docker stop $(docker ps -aq) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true
            docker rmi $(docker images -q) 2>/dev/null || true
            docker system prune -af --volumes
            docker volume rm $(docker volume ls -q) 2>/dev/null || true
            
            echo "🗑️ 기존 프로젝트 파일 삭제"
            sudo rm -rf /home/ubuntu/ice-study-email-service/
            
            echo "📦 SCP 임시 파일들 삭제"
            rm -f /home/ubuntu/*.tar.gz
            
            echo "🧽 시스템 임시 파일 정리"
            sudo rm -rf /tmp/*
            sudo rm -rf /var/tmp/*
            sudo find /var/log -name "*.log" -exec sudo truncate -s 0 {} \;
            
            echo "📜 APT 캐시 정리"
            sudo apt-get clean
            sudo apt-get autoclean
            sudo apt-get autoremove -y
            
            echo "🗂️ Journal 로그 정리"
            sudo journalctl --vacuum-time=1d
            sudo journalctl --vacuum-size=50M
            
            echo "🔍 대용량 파일 찾기 및 삭제"
            sudo find /home -name "*.log" -size +10M -delete 2>/dev/null || true
            sudo find /home -name "core.*" -delete 2>/dev/null || true
            
            echo "✅ 정리 완료 - 최종 디스크 상태"
            df -h
            
            echo "📁 새 디렉토리 생성"
            mkdir -p /home/ubuntu/ice-study-email-service/build/libs/
            
            echo "💾 사용 가능한 공간 확인"
            AVAIL=$(df / | tail -1 | awk '{print $4}')
            echo "사용 가능한 공간: ${AVAIL}KB"
            
            if [ "$AVAIL" -lt 1000000 ]; then
              echo "❌ 여전히 공간 부족 (1GB 미만)"
              exit 1
            else
              echo "✅ 충분한 공간 확보됨"
            fi

      - name: Copy files via SSH (Safe Alternative)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            cd /home/ubuntu/ice-study-email-service/
            
            echo "=== 1. .env 파일 생성 ==="
            cat > .env << 'ENVEOF'
            EC2_HOST=${{ secrets.EC2_HOST }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_HOST=smtp.gmail.com
            MAIL_PORT=587
            SPRING_PROFILES_ACTIVE=prod
            SERVER_PORT=8080
            LOGGING_LEVEL_ROOT=INFO
            KAFKA_BOOTSTRAP_SERVERS=kafka:9093
            TZ=Asia/Seoul
            ENVEOF
            
            echo "=== 2. docker-compose.yml 파일 생성 ==="
            cat > docker-compose.yml << 'COMPOSEEOF'
            version: '3.8'
            
            services:
              zookeeper:
                image: confluentinc/cp-zookeeper:7.4.0
                container_name: zookeeper
                environment:
                  ZOOKEEPER_CLIENT_PORT: 2181
                  ZOOKEEPER_TICK_TIME: 2000
                volumes:
                  - zookeeper-data:/var/lib/zookeeper/data
            
              kafka:
                image: confluentinc/cp-kafka:7.4.0
                container_name: kafka
                depends_on:
                  - zookeeper
                ports:
                  - "9092:9092"
                environment:
                  KAFKA_BROKER_ID: 1
                  KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                  KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_EXTERNAL://${EC2_HOST}:9092
                  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
                  KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_EXTERNAL://0.0.0.0:9092
                  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
                  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                  KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
                volumes:
                  - kafka-data:/var/lib/kafka/data
            
              email-app:
                build:
                  context: .
                  dockerfile: Dockerfile
                container_name: email-app
                ports:
                  - "8080:8080"
                depends_on:
                  - kafka
                environment:
                  - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
                env_file:
                  - .env
                volumes:
                  - ./logs:/app/logs
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
            
            volumes:
              zookeeper-data:
              kafka-data:
            COMPOSEEOF
            
            echo "=== 3. Dockerfile 생성 ==="
            cat > Dockerfile << 'DOCKEREOF'
            FROM eclipse-temurin:21-jre-alpine
            
            WORKDIR /app
            
            RUN apk add --no-cache curl
            
            RUN addgroup -S spring && adduser -S spring -G spring
            USER spring:spring
            
            # JAR 파일 복사
            COPY build/libs/*.jar app.jar
            
            # JVM 옵션 설정
            ENV JAVA_OPTS="-Xmx512m -Xms256m"
            
            # 포트 노출
            EXPOSE 8080
            
            # 헬스체크
            HEALTHCHECK --interval=30s --timeout=3s --start-period=60s --retries=3 \
              CMD curl -f http://localhost:8080/actuator/health || exit 1
            
            # 애플리케이션 실행
            ENTRYPOINT ["sh", "-c", "java $JAVA_OPTS -jar app.jar"]
            DOCKEREOF
            
            echo "=== 4. build/libs 디렉토리 생성 ==="
            mkdir -p build/libs/
            
            echo "=== 파일 생성 완료 ==="
            ls -la
            ls -la build/libs/

      - name: Copy JAR file separately
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          source: "build/libs/*.jar"
          target: "/home/ubuntu/ice-study-email-service/build/libs/"
          timeout: 120s
          command_timeout: 20m

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            cd /home/ubuntu/ice-study-email-service
            
            echo "🔍 현재 Docker 상태 확인..."
            docker ps -a
            docker images
            
            # 1️⃣ 모든 실행 중인 컨테이너 강제 정지
            echo "🛑 모든 컨테이너 강제 정지..."
            docker stop $(docker ps -aq) 2>/dev/null || true
            
            # 2️⃣ 특정 컨테이너들 강제 제거
            echo "🗑️ 기존 컨테이너들 강제 제거..."
            docker rm -f zookeeper kafka email-app 2>/dev/null || true
            
            # 3️⃣ 사용하지 않는 이미지 제거
            echo "🧹 사용하지 않는 이미지 제거..."
            docker image prune -af
            
            # 4️⃣ 네트워크 정리
            echo "🌐 Docker 네트워크 정리..."
            docker network prune -f
            
            # 5️⃣ 볼륨 정리 (주의: 데이터 손실 가능)
            echo "💾 사용하지 않는 볼륨 정리..."
            docker volume prune -f
            
            # 6️⃣ 포트 사용 중인 프로세스 확인 및 종료
            echo "🔌 포트 사용 확인..."
            sudo lsof -ti:8080 | xargs sudo kill -9 2>/dev/null || true
            sudo lsof -ti:9092 | xargs sudo kill -9 2>/dev/null || true
            sudo lsof -ti:2181 | xargs sudo kill -9 2>/dev/null || true
            
            # 7️⃣ Docker 컴포즈 프로젝트별 정리
            echo "📦 Docker Compose 프로젝트 정리..."
            docker-compose down --volumes --remove-orphans 2>/dev/null || true
            
            # 8️⃣ 시스템 전체 Docker 정리
            echo "🧽 시스템 전체 Docker 정리..."
            docker system prune -af --volumes
            
            # 9️⃣ 잠시 대기 (시스템 안정화)
            echo "⏱️ 시스템 안정화 대기..."
            sleep 10
            
            # 🔟 새로운 서비스 시작
            echo "🚀 새로운 서비스 시작..."
            docker-compose up -d --build --force-recreate
            
            # 서비스 상태 확인
            echo "⏳ 서비스 시작 대기..."
            sleep 30
            
            echo "=== 📊 Service Status ==="
            docker-compose ps
            
            echo "=== 🔍 Container Logs ==="
            docker-compose logs --tail=20
            
            # Kafka 준비 상태 확인
            echo "=== 📋 Kafka Health Check ==="
            for i in {1..10}; do
              if docker exec kafka kafka-topics --list --bootstrap-server localhost:9092 > /dev/null 2>&1; then
                echo "✅ Kafka is ready!"
                docker exec kafka kafka-topics --list --bootstrap-server localhost:9092
                break
              else
                echo "⏳ Kafka 준비 중... ($i/10)"
                sleep 10
              fi
            done
            
            # 애플리케이션 헬스체크
            echo "=== 🏥 Application Health Check ==="
            for i in {1..10}; do
              if curl -f http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ Application is healthy!"
                break
              else
                echo "⏳ Application 시작 중... ($i/10)"
                sleep 10
              fi
            done
            
            echo "=== 🎯 Final Status ==="
            docker ps
            docker-compose ps

      - name: Clean Up Docker Images
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          script: |
            echo "🧹 Cleaning up unused Docker images..."
            docker image prune -af --filter "until=24h"

      - name: Remove SSH IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp --port 22 --cidr $RUNNER_IP/32 \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true
